<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLASS XII TKJ C</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            
            /* Menggunakan nama file yang diminta */
            background-image: url('bg-foto.jpg');
            
            /* 'contain' memastikan seluruh gambar terlihat tanpa terpotong */
            /* atau gunakan '100% auto' agar lebar penuh dan tinggi mengikuti gambar */
            background-size: 100% auto; 
            
            background-position: top center;
            background-attachment: scroll;
            background-repeat: no-repeat;

            /* Menghilangkan background putih agar tidak ada sisa warna di bawah gambar */
            background-color: #000000; 
        }

        /* Container utama agar tinggi halaman mengikuti tinggi gambar */
        .main-wrapper {
            width: 100%;
            /* Kalkulasi aspek rasio gambar 1186x1860 */
            /* Tinggi = (1860 / 1186) * 100vw */
            min-height: 156.8vw; 
        }

        .bar-info-header {
            background-color: #000000;
            color: white;
            padding: 20px 0;
            font-weight: bold;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .bar-info-header img {
            max-width: 60px;
            height: auto;
            padding: 0 20px;
        }

        .bar-info-header h4 {
            margin: 0;
            flex-grow: 1;
            text-align: center;
            font-size: 14px;
        }

        .content {
            padding-top: 185px; 
            text-align: center;
        }

    </style>
</head>
<body>

    <div class="bar-info-header">
        <img src="logo.png" alt="Logo">
        <h4>XII TEKNIK KOMPUTER & JARINGAN C</h4>
        <img src="logosmk.png" alt="Logo SMK">
    </div>

    <div class="main-wrapper">
        <div class="content">
            <div class="glass-card">
                <b><i><h5 style="color: white; font-size: 1.5rem; margin: 0;">Welcome!</h5></i></b>
                <i><h6 style="color: white; font-size: 1rem; margin: 5px 0 0 0;">To Class XII TKJ C SMK KRISTEN HARAPAN RANTEPAO</h6></i>
            </div>
        </div>
    </div>

</body>
</html>
