<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLASS XII TKJ C</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: #000000;
        }

        .bg-container {
            background-image: url('bg-foto.jpg');
            background-attachment: scroll;
            background-repeat: no-repeat;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- MODE HP / MOBILE --- */
        @media only screen and (max-width: 768px) {
            .bg-container {
                /* Zoom foto sebesar 125% */
                background-size: 150% auto;
                background-position: center top;
                /* Tinggi disesuaikan agar tidak terpotong saat zoom */
                min-height: 140vw; 
            }
            .bar-info-header h4 { font-size: 11px; }
            .bar-info-header img { max-width: 50px; }
            .content { margin-top: 130px; }
        }

        /* --- MODE PC / LAPTOP --- */
        @media only screen and (min-width: 769px) {
            .bg-container {
                background-size: contain; 
                background-position: center top;
                min-height: 100vh; 
            }
            .content { margin-top: 180px; }
        }

        .bar-info-header {
            background-color: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 15px 0;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .bar-info-header img {
            height: auto;
            padding: 0 15px;
        }

        .bar-info-header h4 {
            margin: 0;
            text-align: center;
            flex: 1;
        }

        .content {
            padding: 20px;
            text-align: center;
            width: 90%;
            max-width: 800px;
        }

        /* Teks sekarang berwarna putih tanpa background kotak */

        h5, h6 {
            margin: 0;
            font-family: Arial, sans-serif;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="bar-info-header">
        <img src="logo.png" style="max-width: 60px;" alt="Logo">
        <h4>XII TEKNIK KOMPUTER & JARINGAN C</h4>
        <img src="logosmk.png" style="max-width: 60px;" alt="Logo SMK">
    </div>

    <div class="bg-container">
        <div class="content">
            <div class="text-main">
                <b><h5 style="font-size: 2rem;">Welcome!</h5></b>
                <h6 style="font-size: 1.2rem; margin-top: 10px;">To Class XII TKJ C SMK KRISTEN HARAPAN RANTEPAO</h6>
            </div>
        </div>
    </div>

</body>
</html>
